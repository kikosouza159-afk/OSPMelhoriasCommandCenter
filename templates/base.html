<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Cockpit | TALENTOS' }}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    :root {
      --bg: #020814;
      --bg-2: #07172a;
      --panel: rgba(6, 18, 34, 0.78);
      --panel-soft: rgba(8, 24, 43, 0.88);
      --line: rgba(148,163,184,.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --blue: #00e5ff;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(0,0,0,.25);
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #020814;
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    .app { min-height: 100vh; display: flex; }
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      inset: 0 auto 0 0;
      background: rgba(3, 12, 25, 0.86); backdrop-filter: blur(16px);
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .brand {
      padding: 10px 12px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .brand-sub { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .menu { display: grid; gap: 10px; }
    .menu a {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border-radius: 16px;
      border: 1px solid transparent; color: #cbd5e1; font-weight: 700;
      background: transparent;
    }
    .menu a:hover { background: rgba(148,163,184,.08); border-color: var(--line); }
    .menu a.active { background: linear-gradient(135deg, rgba(56,189,248,.16), rgba(34,197,94,.14)); border-color: rgba(56,189,248,.25); color: white; }
    .menu .ico { width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; background: rgba(56,189,248,.12); border: 1px solid rgba(56,189,248,.18); }
    .sidebar-foot { margin-top: auto; color: var(--muted); font-size: 12px; padding: 0 10px; }
    .main { flex: 1; margin-left: var(--sidebar-w); }
    .wrap { max-width: 1520px; margin: 0 auto; padding: 28px; }
    .hero { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 24px; }
    .title h1 { margin: 0 0 8px; font-size: 24px; }
    .title p { margin: 0; color: var(--muted); }
    .badge {
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .25);
      color: #bbf7d0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .card { padding: 20px; }
    .error { padding: 18px; border-radius: 18px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.28); color: #fecaca; font-weight: 700; }
    .field-grid { display: flex; flex-wrap: wrap; gap: 14px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 8px; min-width: 220px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }
    .field select, .field input, .field button {
      background: #0b1220; color: var(--text); border: 1px solid var(--line);
      border-radius: 14px; padding: 12px 14px; font-size: 14px;
    }
    .field button { border: none; cursor: pointer; font-weight: 700; background: linear-gradient(135deg, #0ea5e9 0%, #22c55e 100%); }
    .section-title { margin: 0 0 14px; font-size: 20px; }
    .table-wrap { position: relative; margin-top: 10px; max-height: 420px; overflow: auto; border-radius: 16px; border: 1px solid var(--line); background: rgba(15, 23, 42, 0.55); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { color: #cbd5e1; background: rgba(17, 24, 39, 0.98); position: sticky; top: 0; z-index: 2; }
    .status.positivo { color: #22c55e; }
    .status.negativo { color: #ef4444; }
    @media (max-width: 1180px) {
      .sidebar { position: static; width: 100%; height: auto; }
      .main { margin-left: 0; }
      .app { display: block; }
      .menu { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .background { position: fixed; inset: 0; background: radial-gradient(circle at 20% 20%, rgba(0, 229, 255, .16), transparent 30%), radial-gradient(circle at 80% 70%, rgba(0, 106, 255, .18), transparent 34%), linear-gradient(135deg, #020814 0%, #07172a 50%, #020814 100%); z-index: -1; }
    .bg-content { position: fixed; inset: 0; z-index: -1; }

    .bg-grid{position:absolute;inset:-80px;background-image:linear-gradient(rgba(0,229,255,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.10) 1px,transparent 1px);background-size:55px 55px;transform:perspective(500px) rotateX(62deg);transform-origin:center bottom;animation:gridMove 5s linear infinite;opacity:.42}
    @keyframes gridMove{from{background-position:0 0}to{background-position:0 55px}}
    .orb{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(0,229,255,.10);filter:blur(35px);animation:floatOrb 7s ease-in-out infinite alternate}
    .orb.one{top:12%;left:12%}.orb.two{right:10%;bottom:12%;background:rgba(0,102,255,.13);animation-delay:1.5s}
    @keyframes floatOrb{from{transform:translate(0,0) scale(1)}to{transform:translate(45px,-30px) scale(1.25)}}
    .scanline{position:absolute;left:0;right:0;height:130px;background:linear-gradient(transparent,rgba(0,229,255,.08),transparent);animation:scan 6s ease-in-out infinite}
    @keyframes scan{from{top:-150px}to{top:110vh}}
    .electric{position:absolute;inset:0;opacity:.35;filter:drop-shadow(0 0 10px rgba(0,229,255,.8))}
    .electric svg{width:100%;height:100%}
    .electric path{fill:none;stroke:rgba(0,229,255,.45);stroke-width:1.4;stroke-dasharray:12 900;animation:electricRun 3.2s linear infinite}
    .electric path:nth-child(2){animation-delay:1.4s;stroke:rgba(0,120,255,.5)}
    .electric path:nth-child(3){animation-delay:2.2s;stroke:rgba(120,240,255,.42)}
    @keyframes electricRun{from{stroke-dashoffset:900}to{stroke-dashoffset:0}}
    .data-rain{position:absolute;inset:0;overflow:hidden}
    .code{position:absolute;top:-120px;font-size:13px;color:rgba(0,229,255,.55);text-shadow:0 0 12px rgba(0,229,255,.8);writing-mode:vertical-rl;letter-spacing:4px;animation:rain linear infinite;user-select:none}
    .code:nth-child(1){left:6%;animation-duration:8s;animation-delay:0s}.code:nth-child(2){left:16%;animation-duration:11s;animation-delay:1s}.code:nth-child(3){left:29%;animation-duration:9s;animation-delay:2s}.code:nth-child(4){left:43%;animation-duration:13s;animation-delay:.5s}.code:nth-child(5){left:58%;animation-duration:10s;animation-delay:2.8s}.code:nth-child(6){left:72%;animation-duration:12s;animation-delay:1.7s}.code:nth-child(7){left:88%;animation-duration:8.5s;animation-delay:.8s}
    @keyframes rain{from{transform:translateY(-140px);opacity:0}10%{opacity:.9}80%{opacity:.75}to{transform:translateY(120vh);opacity:0}}
    .panel, .top-mini, .step, .mini, .mini-chart-card { backdrop-filter: blur(14px); }
    .field select, .field input { background: rgba(2, 8, 20, .78); }
    .field button { background: linear-gradient(135deg, #00e5ff 0%, #0077ff 100%); color: #00111f; font-weight: 900; }


    /* FIX V1.5: evita conflito da classe .grid do fundo com grids dos dashboards */
    .main { position: relative; z-index: 2; min-width: 0; }
    .wrap { width: 100%; }
    .panel { position: relative; z-index: 2; overflow: hidden; }
    .flow-panel { overflow-x: auto !important; }
    .chart-grid, .mini-grid, .funnel-indicators, .top-strip { position: relative; z-index: 2; }
    .mini-chart-card { min-width: 0; overflow: hidden; }
    .chart-box { max-width: 100%; }
    .table-wrap { width: 100%; max-width: 100%; overflow: auto !important; }
    table { min-width: max-content; }
    canvas { max-width: 100% !important; }
    .sidebar { z-index: 4; }
    .bg-content { pointer-events: none; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include 'background.html' %}
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">TALENTOS</div>
        <div class="brand-sub">Locator Dashboard integrado ao Cockpit.</div>
      </div>
      <nav class="menu">
        <a href="/cliente/talentos/painel" class="{% if page == 'dashboard' %}active{% endif %}"><span class="ico">📊</span><span>Dashboard</span></a>
        <a href="/cliente/talentos/painel/comparativo" class="{% if page == 'comparativo' %}active{% endif %}"><span class="ico">🔀</span><span>Comparativo</span></a>
        <a href="/cliente/talentos/painel/tabulacao" class="{% if page == 'tabulacao' %}active{% endif %}"><span class="ico">🧾</span><span>Tabulação</span></a>
      </nav>
      <div class="sidebar-foot"><a href="/dashboard" style="color:#91f3ff;font-weight:800;">← Voltar ao menu Cockpit</a></div>
    </aside>
    <main class="main">
      <div class="wrap">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
